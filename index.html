<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/favicon.ico?v=3" />
    <link rel="icon" type="image/png" href="/favicon.png?v=3" />
    <link rel="apple-touch-icon" href="/favicon.png?v=3" />
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="/assets/img/cover.webp"
    />
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="/assets/img/xiramandi-makor.webp"
    />
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="/assets/img/logo-frame.webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Prosto+One&family=Roboto:ital,wght@0,100..900;1,100..900&family=UnifrakturCook:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        background: #050506;
      }

      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        background: #050506;
      }

      .boot-loader__content {
        width: min(360px, 84vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .boot-loader__brand {
        color: #b9bec7;
        font-family: Roboto, Arial, sans-serif;
        font-size: clamp(22px, 3vw, 32px);
        font-weight: 500;
        line-height: 1;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .boot-loader__progress {
        width: min(240px, 70vw);
        display: grid;
        justify-items: center;
        gap: 9px;
      }

      .boot-loader__track {
        width: 100%;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
      }

      .boot-loader__fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #8f7433 0%, #c7aa61 100%);
      }

      .boot-loader__percent {
        color: #8d929b;
        font-family: Roboto, Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: 0.03em;
      }
</style>
    <title>Hiranmandi iframe</title>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader" role="status" aria-label="Loading game">
        <div class="boot-loader__content">
          <div class="boot-loader__brand">betproduct.com</div>
          <div class="boot-loader__progress" aria-label="0% loaded">
            <div class="boot-loader__track">
              <div class="boot-loader__fill"></div>
            </div>
            <div class="boot-loader__percent">0%</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
